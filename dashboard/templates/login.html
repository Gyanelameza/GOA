<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOA - Iniciar Sesión Docente</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Outfit',sans-serif; background:#fff; overflow:hidden; height:100vh; display:flex; justify-content:center; align-items:center; }

        /* Fondo visual idéntico al portal */
        .portal-bg {
            position: absolute; inset: 0; z-index: 0;
            background: 
                radial-gradient(circle at 50% -20%, #e8f5fd 0%, #b8def3 45%, #8ecce9 75%, #59afd5 100%),
                linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
            background-blend-mode: overlay;
            overflow: hidden;
        }

        .wave-light {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: rotate(-35deg);
            filter: blur(15px);
            pointer-events: none;
            z-index: 1;
        }
        .wl1 { width: 120px; height: 200%; top: -50%; left: 15%; animation: waveLightFlow 14s infinite linear; }
        .wl2 { width: 80px; height: 200%; top: -50%; left: 45%; animation: waveLightFlow 20s infinite linear; animation-delay: 2s; }
        .wl3 { width: 140px; height: 200%; top: -50%; left: 75%; animation: waveLightFlow 17s infinite linear; animation-delay: 4s; }
        @keyframes waveLightFlow {
            0% { transform: translate(-150px, -150px) rotate(-35deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate(150px, 150px) rotate(-35deg); opacity: 0; }
        }

        .sparkle {
            position: absolute; z-index: 1;
            font-size: 1.4rem; color: rgba(255,255,255,0.45);
            animation: sparkleAnim 3.5s ease-in-out infinite;
        }
        .sp1 { bottom: 18%; right: 8%;  animation-delay: 0s; }
        .sp2 { bottom: 22%; right: 14%; animation-delay: 0.6s; font-size: 1rem; }
        .sp3 { bottom: 14%; right: 5%;  animation-delay: 1.2s; font-size: .8rem; }
        .sp4 { bottom: 20%; left: 6%;   animation-delay: 0.4s; }
        @keyframes sparkleAnim {
            0%,100% { opacity: 0.25; transform: scale(0.8); }
            50%      { opacity: 0.65; transform: scale(1.15); }
        }

        /* Contenedor del Login (Cristal templado / Glassmorphism) */
        .login-container {
            position: relative; z-index: 10;
            width: 90%; max-width: 440px;
            background: rgba(255, 255, 255, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 28px;
            padding: 40px 32px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 16px 48px rgba(30, 90, 150, 0.12);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo en el login */
        .logo-header {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px; height: 80px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            margin-bottom: 20px;
            border: 1px solid rgba(14, 165, 233, 0.2);
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.15);
        }
        .logo-header img {
            width: 54px; height: 54px;
            object-fit: contain;
        }

        .login-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1a3a5c;
            letter-spacing: -.5px;
            margin-bottom: 6px;
        }
        .login-subtitle {
            font-size: 0.88rem;
            color: #4b6e8a;
            margin-bottom: 28px;
        }

        /* Formulario */
        .form-group {
            position: relative;
            margin-bottom: 18px;
            text-align: left;
        }
        .form-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 700;
            color: #2c4a6f;
            margin-bottom: 6px;
            padding-left: 4px;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #5c8bb0;
            font-size: 1rem;
        }
        .form-input {
            width: 100%;
            padding: 13px 16px 13px 44px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.65);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            color: #1a3a5c;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            background: #fff;
            border-color: #3b9d69;
            box-shadow: 0 0 0 3px rgba(59, 157, 105, 0.15);
        }

        /* Mensajes de error */
        .error-alert {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: left;
        }

        /* Botón de envío */
        .btn-submit {
            width: 100%;
            padding: 13px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, #3f9d69, #298552);
            color: #fff;
            box-shadow: 0 4px 16px rgba(41, 133, 82, 0.3);
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(41, 133, 82, 0.45);
        }
        .btn-submit:active {
            transform: translateY(0);
        }

        /* Botón de volver */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 24px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4b6e8a;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .btn-back:hover {
            color: #1a3a5c;
        }
    </style>
</head>
<body>

    <!-- Fondo visual -->
    <div class="portal-bg">
        <div class="wave-light wl1"></div>
        <div class="wave-light wl2"></div>
        <div class="wave-light wl3"></div>
    </div>
    <div class="sparkle sp1">✦</div>
    <div class="sparkle sp2">✦</div>
    <div class="sparkle sp3">✦</div>
    <div class="sparkle sp4">✦</div>

    <!-- Contenedor del Login -->
    <div class="login-container">
        <div class="logo-header">
            <img src="{{ url_for('static', filename='goa_logo_oficial.png') }}" alt="GO-A Logo">
        </div>
        <h2 class="login-title">Acceso Docente</h2>
        <p class="login-subtitle">Ingresa tus credenciales para administrar la clase</p>

        {% if error %}
        <div class="error-alert">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label class="form-label" for="email">Correo Electrónico</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input class="form-input" type="email" id="email" name="email" required placeholder="correo@ejemplo.com" value="{{ request.form.get('email', '') }}">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input class="form-input" type="password" id="password" name="password" required placeholder="Introduce tu contraseña">
                </div>
            </div>

            <button type="submit" class="btn-submit">Entrar al Panel</button>
        </form>

        <a href="{{ url_for('index') }}" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> Volver al Portal
        </a>
    </div>

</body>
</html>
